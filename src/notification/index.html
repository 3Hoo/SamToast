<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>SamToast</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  </style>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="toast" class="toast">
    <div id="image-container" class="image-container">
      <img id="toast-image" src="" alt="" />
      <iframe id="toast-iframe" src="" sandbox="allow-scripts allow-same-origin" style="display: none;"></iframe>
    </div>
    <div class="toast-info">
      <div id="app-name" class="app-name">Claude Code</div>
      <div id="session-cwd" class="session-cwd"></div>
      <div id="event-badge" class="event-badge"></div>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
